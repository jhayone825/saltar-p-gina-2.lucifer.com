<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de Entradas Enterprise | v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; background-color: #020617; }
        .scanning { background: linear-gradient(to bottom, transparent 50%, rgba(59, 130, 246, 0.1) 50%); background-size: 100% 4px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; }
        .node-pulse { animation: node-pulse 2s infinite; }
        @keyframes node-pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body class="text-slate-300 p-6 flex justify-center items-center min-h-screen scanning">

    <div class="w-full max-w-6xl grid grid-cols-12 gap-4">
        
        <div class="col-span-12 lg:col-span-3 space-y-4">
            <div class="bg-slate-900 border border-slate-800 p-4 rounded-lg shadow-lg">
                <h3 class="text-[10px] font-bold text-blue-500 mb-4 tracking-tighter uppercase italic">Red de Nodos Global</h3>
                <div class="space-y-3 text-[10px]">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500">MADRID_ES</span>
                        <span class="w-2 h-2 bg-green-500 rounded-full node-pulse"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500">LONDRES_UK</span>
                        <span class="w-2 h-2 bg-green-500 rounded-full node-pulse" style="animation-delay: 0.5s"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500">TOKIO_JP</span>
                        <span class="w-2 h-2 bg-yellow-500 rounded-full node-pulse" style="animation-delay: 1s"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500">NUEVA_YORK_US</span>
                        <span class="w-2 h-2 bg-green-500 rounded-full node-pulse" style="animation-delay: 1.5s"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-6 space-y-4">
            <div class="bg-slate-900 border border-blue-900/30 p-6 rounded-xl shadow-2xl relative overflow-hidden">
                <h1 class="text-lg font-bold text-white flex items-center mb-6 tracking-tight">
                    <div class="w-3 h-3 bg-blue-500 rounded-sm mr-3 shadow-[0_0_10px_rgba(59,130,246,1)]"></div>
                    SISTEMA_BYPASS_TICKETS
                </h1>

                <div class="space-y-4">
                    <button id="runBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded shadow-xl transition-all transform active:scale-95 text-sm tracking-widest uppercase">
                        INICIAR SECUENCIA DE ACCESO
                    </button>

                    <div id="main-terminal" class="bg-black border border-slate-800 rounded p-4 h-72 overflow-y-auto font-mono text-[11px] leading-relaxed shadow-inner">
                        <p class="text-slate-600 italic">Esperando inicialización de hardware...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('main-terminal');
        const btn = document.getElementById('runBtn');

        const logs = [
            "Estableciendo túnel SSH con nodo MAD-01...",
            "Cargando módulos de evasión de huella digital...",
            "Bypass de Akamai Cookie iniciado...",
            "Saltando sala de espera virtual (Queue-it)...",
            "Validando disponibilidad de asientos...",
            "Acceso al checkout desbloqueado."
        ];

        // Event listener for the terminal to handle clicks on dynamic buttons
        terminal.addEventListener('click', (e) => {
            const url = e.target.getAttribute('data-url');
            if (url) {
                window.location.assign(url); // More reliable for hosted environments
            }
        });

        function askRedirect() {
            const prompt = document.createElement('div');
            prompt.className = "bg-slate-800 p-4 border border-blue-500/30 mt-4 rounded-lg space-y-3";
            prompt.innerHTML = `
                <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Seleccionar Portal de Destino:</p>
                <div class="grid grid-cols-1 gap-2">
                    <button data-url="https://tickets.realmadrid.com/realmadrid_ligamatchday/select/2565552?queueittoken=e_realmadridliga2526~ts_1776494312~ce_true~q_59e67146-7c6c-4ce9-aa18-8f40719df9c2~rt_queue~ti_80dfe7fa-1b05-481f-adda-ebfa4d9f22b0~h_09afd7ad119ef3b7f6c10516f29d6dfff59c88821412399a35c06b655662702a&viewCode=V_blockmap_view" class="redirect-trigger w-full py-2 bg-blue-900/40 hover:bg-blue-600 border border-blue-500/50 rounded text-[9px] transition-all uppercase font-bold">Real Madrid Matchday Access</button>
                    <button data-url="https://www.ticketmaster.es" class="redirect-trigger w-full py-2 bg-slate-900 hover:bg-blue-600 border border-slate-700 rounded text-[9px] transition-all uppercase font-bold">Ticketmaster España</button>
                </div>
            `;
            terminal.appendChild(prompt);
            terminal.scrollTop = terminal.scrollHeight;
        }

        btn.addEventListener('click', () => {
            btn.disabled = true;
            btn.innerText = "EJECUTANDO...";
            btn.classList.add('opacity-50');
            terminal.innerHTML = "";

            let i = 0;
            const logInterval = setInterval(() => {
                if (i < logs.length) {
                    const line = document.createElement('p');
                    line.className = "mb-1 border-l-2 border-blue-500 pl-2 bg-blue-500/5";
                    line.innerHTML = `<span class="text-slate-500 text-[9px]">[${new Date().toLocaleTimeString()}]</span> <span class="text-blue-400">${logs[i]}</span>`;
                    terminal.appendChild(line);
                    terminal.scrollTop = terminal.scrollHeight;
                    i++;
                } else {
                    clearInterval(logInterval);
                    const success = document.createElement('div');
                    success.className = "bg-green-500/10 border border-green-500 p-3 text-green-500 font-bold mt-4 text-center rounded";
                    success.innerHTML = ">>> ACCESO CONCEDIDO: BYPASS COMPLETADO";
                    terminal.appendChild(success);
                    askRedirect();
                    btn.innerText = "ACCESO DISPONIBLE";
                }
            }, 800);
        });
    </script>
</body>
</html>
