<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado del Sistema | Real Madrid CF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;700;900&display=swap');
        
        body { 
            font-family: 'Libre+Franklin', sans-serif; 
            background-color: #000000; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Pantalla completa de bloqueo */
        .stop-container {
            text-align: center;
            padding: 20px;
        }

        .bot-stopped-title {
            font-size: 5rem;
            font-weight: 900;
            font-style: italic;
            color: #ff0000;
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -0.05em;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            animation: flash 1.5s infinite;
        }

        .status-badge {
            display: inline-block;
            background-color: #ff0000;
            color: white;
            padding: 5px 15px;
            font-weight: 900;
            border-radius: 4px;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
        }

        .admin-msg {
            color: #64748b;
            font-size: 1.2rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Líneas de interferencia decorativas */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(255, 0, 0, 0.1);
            position: absolute;
            top: 50%;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            from { top: 0%; }
            to { top: 100%; }
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="stop-container">
        <div class="status-badge">SISTEMA OFF</div>
        <h1 class="bot-stopped-title">BOT<br>DETENIDO</h1>
        <p class="admin-msg">Acceso restringido por el administrador</p>
    </div>

</body>
</html>
